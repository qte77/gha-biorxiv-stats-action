# https://docs.github.com/en/actions/sharing-automations/creating-actions/creating-a-composite-action
name: "bioRxiv Stats Action"
description: "Log daily stats of papers submitted to biorxiv.org or medrxiv.org for selected categories."
author: "qte77"
branding:
  icon: "file-text"
  color: "green"
inputs:
  OUT_DIR:
    description: "Directory to write CSV output files."
    default: "./data"
  DAYS:
    description: "Number of days back to fetch."
    default: "1"
  CATEGORIES:
    description: "bioRxiv category filter (e.g. neuroscience). Empty for all."
    default: ""
  SERVER:
    description: "API server: biorxiv or medrxiv."
    default: "biorxiv"
  PY_VER:
    description: "Python version to use."
    default: "3.10"
  TOKEN:
    description: "GitHub token for pushing changes."
    default: ""
runs:
  using: "composite"
  steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        fetch-depth: 1
        token: ${{ inputs.TOKEN || github.token }}

    - name: Setup Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ inputs.PY_VER }}
        cache: "pip"

    - name: Install dependencies and run
      shell: bash
      env:
        OUT_DIR: ${{ inputs.OUT_DIR }}
        DAYS: ${{ inputs.DAYS }}
        CATEGORIES: ${{ inputs.CATEGORIES }}
        SERVER: ${{ inputs.SERVER }}
        PYTHONPATH: ${{ github.action_path }}/app
      run: |
        pip install -qqr "${{ github.action_path }}/app/requirements.txt"
        python "${{ github.action_path }}/app/app.py"

    - name: Commit via PR if changes
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.TOKEN || github.token }}
        OUT_DIR: ${{ inputs.OUT_DIR }}
        REPO: ${{ github.repository }}
      run: |
        git add "$OUT_DIR"
        git diff --cached --quiet && echo "No changes. Nothing to do." && exit 0
        DATE=$(date -u +%Y%m%d-%H%M%S)
        BRANCH="auto-update-$DATE"
        BASE_SHA=$(gh api "repos/$REPO/git/ref/heads/main" --jq '.object.sha')
        BASE_TREE=$(gh api "repos/$REPO/git/commits/$BASE_SHA" --jq '.tree.sha')
        TREE_ENTRIES="[]"
        for file in $(git diff --cached --name-only); do
          CONTENT=$(base64 -w0 "$file")
          BLOB_SHA=$(gh api "repos/$REPO/git/blobs" -f content="$CONTENT" -f encoding=base64 --jq '.sha')
          TREE_ENTRIES=$(echo "$TREE_ENTRIES" | jq --arg path "$file" --arg sha "$BLOB_SHA" \
            '. + [{"path": $path, "mode": "100644", "type": "blob", "sha": $sha}]')
        done
        NEW_TREE=$(gh api "repos/$REPO/git/trees" \
          --input <(jq -n --arg base "$BASE_TREE" --argjson tree "$TREE_ENTRIES" \
            '{base_tree: $base, tree: $tree}') --jq '.sha')
        COMMIT_SHA=$(gh api "repos/$REPO/git/commits" \
          --input <(jq -n --arg msg "Updated $OUT_DIR" --arg tree "$NEW_TREE" --arg parent "$BASE_SHA" \
            '{message: $msg, tree: $tree, parents: [$parent]}') --jq '.sha')
        gh api "repos/$REPO/git/refs" -f ref="refs/heads/$BRANCH" -f sha="$COMMIT_SHA"
        PR_NUM=$(gh api "repos/$REPO/pulls" \
          -f title="chore: update $OUT_DIR" \
          -f body="Auto-generated by bioRxiv Stats Action." \
          -f head="$BRANCH" -f base=main --jq '.number')
        gh api "repos/$REPO/pulls/$PR_NUM/merge" -X PUT \
          -f merge_method=squash \
          -f commit_title="chore: update $OUT_DIR" \
          -f commit_message=""
